name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Database environment to migrate
        required: true
        type: choice
        options:
          - production
          - preview
        default: production

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: db-migrate-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Add migration summary
        run: echo "Applied Drizzle migrations to the ${{ inputs.environment }} database." >> "$GITHUB_STEP_SUMMARY"
