name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Vercel environment to deploy
        required: true
        type: choice
        options:
          - production
          - preview
        default: production

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  migrate-production:
    if: ${{ github.event_name == 'push' || inputs.environment == 'production' }}
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: db-migrate-production
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Add migration summary
        run: echo "Applied Drizzle migrations to the production database." >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    if: ${{ github.event_name == 'push' || inputs.environment == 'production' }}
    needs: migrate-production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: vercel-production
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build deployment artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tee deployment-url.txt
          echo "deployment_url=$(tail -n 1 deployment-url.txt)" >> "$GITHUB_OUTPUT"

      - name: Add deployment summary
        run: |
          echo "Production deployment: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-preview:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'preview' }}
    runs-on: ubuntu-latest
    environment: preview
    concurrency:
      group: vercel-preview
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build deployment artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} | tee deployment-url.txt
          echo "deployment_url=$(tail -n 1 deployment-url.txt)" >> "$GITHUB_OUTPUT"

      - name: Add deployment summary
        run: |
          echo "Preview deployment: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
